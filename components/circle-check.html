<!-- 
  Frogverse — Circle Check (radio-like)
  Figma: CircleCheck (node 183:3262)
  States: Unchecked, Checked (.circle-check--checked)
  
  Usage: Add/remove .circle-check--checked via JS
-->

<span class="circle-check circle-check--checked" role="radio" aria-checked="true" tabindex="0"></span>
