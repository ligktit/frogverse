<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Frogverse — Loading">
  <meta name="theme-color" content="#FDCC34">
  <title>Frogverse — Loading</title>
  <!-- Preload critical images -->
  <link rel="preload" as="image" href="../assets/bg-main.webp">
  <link rel="preload" as="image" href="../assets/loading-screen/left-curtain.webp">
  <link rel="preload" as="image" href="../assets/loading-screen/right-curtain.webp">
  <link rel="preload" as="image" href="../assets/loading-screen/bg-curtain.webp">
  <link rel="preload" as="image" href="../assets/loading-screen/logo.webp">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/t0W3XMIZ+HaLayEPQ4/CPZ2eFCrGKH" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@700&family=Inter:wght@400;500;700&family=Alice&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/loading.css">
</head>
<body>
  <div class="device-simulator">
  <div class="app" id="app">

    <!-- ============ STAGE 1: RED CURTAIN ============ -->
    <div class="loading-stage" id="stageCurtain">
      <!-- Swirl background -->
      <div class="loading-bg">
        <img src="../assets/bg-main.webp" alt="" class="loading-bg__img" aria-hidden="true">
      </div>
      <!-- Logo text (hidden in stage 1, starts small for zoom-in) -->
      <div class="loading-logo loading-logo--center" id="logoCenter" style="opacity:0; transform: translate(-50%, -50%) scale(0.6);">
        <img src="../assets/loading-screen/logo.webp" alt="Frogverse" class="loading-logo__img">
      </div>
      <!-- Curtain drapes -->
      <div class="curtain">
        <div class="curtain__left">
          <img src="../assets/loading-screen/left-curtain.webp" alt="" class="curtain__img" aria-hidden="true">
        </div>
        <div class="curtain__right">
          <img src="../assets/loading-screen/right-curtain.webp" alt="" class="curtain__img" aria-hidden="true">
        </div>
      </div>
      <!-- Drape overlay (valance) -->
      <div class="drape" id="drapeOverlay">
        <div class="drape__valance" id="valance">
          <img src="../assets/loading-screen/bg-curtain.webp" alt="" class="drape__valance-img" aria-hidden="true">
        </div>
      </div>
      <!-- Bottom gradient -->
      <div class="loading-gradient"></div>
    </div>

    <!-- ============ STAGE 2 (Frogs layer — starts hidden) ============ -->
    <div class="loading-stage" id="stageFrogs" style="opacity:0;">
      <!-- Swirl background -->
      <div class="loading-bg">
        <img src="../assets/bg-main.webp" alt="" class="loading-bg__img" aria-hidden="true">
      </div>
      <!-- Logo at top -->
      <div class="loading-logo loading-logo--top" id="logoTop">
        <img src="../assets/loading-screen/logo.webp" alt="Frogverse" class="loading-logo__img">
      </div>
      <!-- Frog characters -->
      <div class="frogs" id="frogsGroup">
        <div class="frog frog--prince-consort">
          <img src="../assets/loading-screen/prince consort.webp" alt="" aria-hidden="true">
        </div>
        <div class="frog frog--princess">
          <img src="../assets/loading-screen/princess.webp" alt="" aria-hidden="true">
        </div>
        <div class="frog frog--queen">
          <img src="../assets/loading-screen/queen.webp" alt="" aria-hidden="true">
        </div>
        <div class="frog frog--prince">
          <img src="../assets/loading-screen/prince.webp" alt="" aria-hidden="true">
        </div>
        <div class="frog frog--king">
          <img src="../assets/loading-screen/king.webp" alt="" aria-hidden="true">
        </div>
      </div>
      <!-- Bottom gradient -->
      <div class="loading-gradient"></div>
      <!-- Loading text (hidden until stage 4) -->
      <div class="loading-text" id="loadingText" style="opacity:0;">
        <span class="loading-text__label">Loading...</span>
      </div>
    </div>

  </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    // ---- Preload home.html AFTER curtain opens (defer to avoid CPU competition) ----
    let homeReady;
    function startHomePreload() {
      homeReady = new Promise((resolve) => {
        const iframe = document.createElement('iframe');
        iframe.style.cssText = 'position:absolute;width:0;height:0;border:0;opacity:0;pointer-events:none;';
        iframe.src = 'home.html';
        iframe.onload = () => resolve();
        document.body.appendChild(iframe);
      });
    }

    // ---- Wait for all images to decode before starting animation ----
    const images = document.querySelectorAll('#app img');
    Promise.all([...images].map(img => img.decode().catch(() => {}))).then(() => {

      // ---- Animated loading sequence ----
      const tl = gsap.timeline();

      // GPU hints
      gsap.set('.curtain__left, .curtain__right, #valance, #logoCenter, #frogsGroup, #stageFrogs, #stageCurtain', {
        force3D: true
      });

      // Set frogs initial position: below the screen
      gsap.set('#frogsGroup', { y: '120%' });

      // Stage 1 → 2: Open curtains + zoom bg-curtain + logo zoom-in
      tl.to('.curtain__left', {
        x: '-100%', duration: 1.6, ease: 'power3.inOut', delay: 1.0
      })
      .to('.curtain__right', {
        x: '100%', duration: 1.6, ease: 'power3.inOut'
      }, '<')
      .to('#valance', {
        scale: 2.0, opacity: 0, duration: 1.6, ease: 'power3.inOut',
        transformOrigin: 'center center'
      }, '<')
      // Logo zooms in smoothly
      .to('#logoCenter', {
        opacity: 1, scale: 1, duration: 1.4, ease: 'power2.out',
        onStart: startHomePreload  // Start preloading home after curtain opens
      }, '-=1.0')

      // Stage 3: Crossfade to frogs, frogs slide up from bottom
      .to('#stageFrogs', {
        opacity: 1, duration: 0.8, ease: 'power1.inOut', delay: 1.0
      })
      .to('#stageCurtain', {
        opacity: 0, duration: 0.8
      }, '<')
      .to('#frogsGroup', {
        y: 0, duration: 1.8, ease: 'power2.out'
      }, '<+=0.2')

      // Stage 4: Show "Loading..." text
      .to('#loadingText', {
        opacity: 1, duration: 0.6, ease: 'power1.inOut'
      }, '-=0.6');

      // ---- Navigate when both ready ----
      const animationDone = new Promise((resolve) => {
        tl.eventCallback('onComplete', resolve);
      });

      animationDone.then(async () => {
        if (homeReady) await homeReady;
        gsap.to('#app', {
          opacity: 0, duration: 0.4, ease: 'power1.in',
          onComplete: () => { window.location.href = 'home.html'; }
        });
      });
    });
  </script>
</body>
</html>
